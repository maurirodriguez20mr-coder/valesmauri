const app = initializeApp(firebaseConfig);

// Firestore con persistencia offline
const db = initializeFirestore(app, {
  localCache: persistentLocalCache({ tabManager: persistentSingleTabManager({}) })
});

// --- Collections ---
const empCol = collection(db, "empleados");
const valCol = collection(db, "vales");

// --- DB helpers ---
async function loadEmpleados() {
  const snap = await getDocs(empCol);
  const arr = [];
  snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
  arr.sort((a, b) => a.legajo - b.legajo);
  return arr;
}

async function loadVales() {
  const snap = await getDocs(valCol);
  const arr = [];
  snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
  return arr;
}

async function saveEmpleado(emp) {
  const docId = "leg_" + emp.legajo;
  await setDoc(doc(db, "empleados", docId), { legajo: emp.legajo, nombre: emp.nombre });
}

async function deleteEmpleado(legajo) {
  await deleteDoc(doc(db, "empleados", "leg_" + legajo));
}

async function saveVale(vale) {
  const docId = vale.id ? String(vale.id) : "v_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6);
  const data = { ...vale, id: docId };
  await setDoc(doc(db, "vales", docId), data);
  return data;
}

async function deleteValeDoc(id) {
  await deleteDoc(doc(db, "vales", String(id)));
}

async function updateValesForLegajo(oldLeg, newLeg, newNombre, vales) {
  const batch = writeBatch(db);
  let count = 0;
  for (const v of vales) {
    if (v.legajo === oldLeg) {
      const ref = doc(db, "vales", String(v.id));
      batch.update(ref, { legajo: newLeg, nombre: newNombre });
      count++;
    }
  }
  if (count > 0) await batch.commit();
}

async function seedIfEmpty() {
  const emps = await loadEmpleados();
  if (emps.length > 0) return { emps, seeded: false };

  // Seed empleados
  const seedEmps = SEED_EMP.map(e => ({ legajo: e.l, nombre: e.n }));
  const empBatch = writeBatch(db);
  for (const e of seedEmps) {
    empBatch.set(doc(db, "empleados", "leg_" + e.legajo), e);
  }
  await empBatch.commit();

  // Seed vales (in batches of 500)
  const empMap = {};
  seedEmps.forEach(e => { empMap[e.legajo] = e.nombre; });
  const seedVales = SV.map((v, i) => ({
    id: "seed_" + i,
    legajo: v[0],
    nombre: empMap[v[0]] || "LEGAJO " + v[0],
    mes: MN[v[1]],
    anio: 2026,
    tipo: "ADELANTO",
    valor: v[2],
    obs: v[3],
    fecha: "2026-0" + (v[1]+1) + "-15T12:00:00.000Z"
  }));

  for (let i = 0; i < seedVales.length; i += 450) {
    const chunk = seedVales.slice(i, i + 450);
    const vBatch = writeBatch(db);
    for (const v of chunk) {
      vBatch.set(doc(db, "vales", v.id), v);
    }
    await vBatch.commit();
  }

  return { emps: seedEmps.map(e => ({ id: "leg_" + e.legajo, ...e })), seeded: true };
}

<script type="text/babel" data-type="module">
const { useState, useEffect, useCallback } = React;

const TABS = ["Personal", "Vales", "Búsqueda", "Informes"];
const MONTHS = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
const CY = new Date().getFullYear();
const CM = MONTHS[new Date().getMonth()];

const cl = {
  bg: "#0f172a", card: "#1e293b", alt: "#334155", accent: "#f97316",
  text: "#f1f5f9", muted: "#94a3b8", border: "#475569", input: "#0f172a",
  danger: "#ef4444", success: "#22c55e", header: "#0c1525"
};

// --- UI Components ---
function Btn({ children, onClick, variant = "primary", disabled, style, small }) {
  const vs = {
    primary: { background: cl.accent, color: "#fff" },
    secondary: { background: cl.alt, color: cl.text },
    danger: { background: cl.danger, color: "#fff" },
    success: { background: cl.success, color: "#fff" },
    ghost: { background: "transparent", color: cl.accent, border: "1px solid " + cl.accent }
  };
  return (
    <button style={{ padding: small ? "6px 14px" : "10px 20px", borderRadius: 8, border: "none", fontWeight: 600,
      fontSize: small ? 13 : 14, cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.5 : 1,
      ...vs[variant], ...style }} onClick={onClick} disabled={disabled}>{children}</button>
  );
}

function Inp({ label, value, onChange, type, placeholder, style, readOnly, autoFocus }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 4, ...style }}>
      {label && <label style={{ fontSize: 13, color: cl.muted, fontWeight: 500 }}>{label}</label>}
      <input type={type || "text"} value={value} onChange={e => onChange(e.target.value)}
        placeholder={placeholder} readOnly={readOnly} autoFocus={autoFocus}
        style={{ padding: "10px 14px", borderRadius: 8, border: "1px solid " + cl.border,
          background: readOnly ? cl.alt : cl.input, color: cl.text, fontSize: 14, outline: "none",
          opacity: readOnly ? 0.7 : 1 }} />
    </div>
  );
}

function Sel({ label, value, onChange, options, style }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 4, ...style }}>
      {label && <label style={{ fontSize: 13, color: cl.muted, fontWeight: 500 }}>{label}</label>}
      <select value={value} onChange={e => onChange(e.target.value)}
        style={{ padding: "10px 14px", borderRadius: 8, border: "1px solid " + cl.border,
          background: cl.input, color: cl.text, fontSize: 14, outline: "none" }}>
        {options.map(o => {
          const val = typeof o === "string" ? o : o.value;
          const lab = typeof o === "string" ? o : o.label;
          return <option key={val} value={val}>{lab}</option>;
        })}
      </select>
    </div>
  );
}

function Badge({ tipo }) {
  const isA = tipo === "ADELANTO";
  return <span style={{ padding: "3px 10px", borderRadius: 6, fontSize: 12, fontWeight: 600,
    background: isA ? "#f9731622" : "#3b82f622", color: isA ? cl.accent : "#60a5fa" }}>{tipo}</span>;
}

function Toast({ message, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2500); return () => clearTimeout(t); }, [onClose]);
  return <div className="toast" style={{ background: type === "success" ? cl.success : type === "error" ? cl.danger : cl.accent }}>{message}</div>;
}

// --- Tab: Personal ---
function TabPersonal({ employees, setEmployees, vouchers, setVouchers, showToast, FB }) {
  const [legajo, setLegajo] = useState("");
  const [nombre, setNombre] = useState("");
  const [editIdx, setEditIdx] = useState(-1);
  const [origLegajo, setOrigLegajo] = useState(null);
  const [search, setSearch] = useState("");

  const save = async () => {
    if (!legajo.trim() || !nombre.trim()) return showToast("Completar legajo y nombre", "error");
    const num = parseInt(legajo);
    if (isNaN(num)) return showToast("Legajo debe ser numérico", "error");

    if (editIdx >= 0) {
      const oldLeg = origLegajo;
      if (num !== oldLeg && employees.some(e => e.legajo === num)) return showToast("Ese legajo ya existe", "error");

      // Delete old doc if legajo changed
      if (num !== oldLeg) await FB.deleteEmpleado(oldLeg);
      await FB.saveEmpleado({ legajo: num, nombre: nombre.trim().toUpperCase() });

      // Update vouchers
      if (num !== oldLeg || nombre.trim().toUpperCase() !== employees[editIdx].nombre) {
        await FB.updateValesForLegajo(oldLeg, num, nombre.trim().toUpperCase(), vouchers);
        setVouchers(vouchers.map(v => v.legajo === oldLeg ? { ...v, legajo: num, nombre: nombre.trim().toUpperCase() } : v));
      }

      const u = [...employees];
      u[editIdx] = { ...u[editIdx], legajo: num, nombre: nombre.trim().toUpperCase() };
      u.sort((a, b) => a.legajo - b.legajo);
      setEmployees(u);
      setEditIdx(-1); setOrigLegajo(null);
      showToast("Legajo actualizado");
    } else {
      if (employees.some(e => e.legajo === num)) return showToast("Legajo ya existe", "error");
      await FB.saveEmpleado({ legajo: num, nombre: nombre.trim().toUpperCase() });
      const u = [...employees, { legajo: num, nombre: nombre.trim().toUpperCase() }];
      u.sort((a, b) => a.legajo - b.legajo);
      setEmployees(u);
      showToast("Legajo agregado");
    }
    setLegajo(""); setNombre("");
  };

  const del = async (idx) => {
    if (!confirm("¿Eliminar legajo " + employees[idx].legajo + "?")) return;
    await FB.deleteEmpleado(employees[idx].legajo);
    setEmployees(employees.filter((_, i) => i !== idx));
    showToast("Legajo eliminado");
  };

  const filtered = employees.filter(e => e.nombre.includes(search.toUpperCase()) || String(e.legajo).includes(search));

  return (
    <div style={{ display: "flex", gap: 24, flexWrap: "wrap" }}>
      <div style={{ flex: "1 1 320px", background: cl.card, borderRadius: 12, padding: 24 }}>
        <h3 style={{ margin: "0 0 20px", color: cl.text, fontSize: 18 }}>{editIdx >= 0 ? "Editar Legajo" : "Nuevo Legajo"}</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <Inp label="Nº Legajo" value={legajo} onChange={setLegajo} type="number" placeholder="Ej: 1034" autoFocus />
          <Inp label="Apellido y Nombre" value={nombre} onChange={setNombre} placeholder="Ej: RODRIGUEZ, MAURI" />
          <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
            <Btn onClick={save}>{editIdx >= 0 ? "Actualizar" : "Guardar"}</Btn>
            {editIdx >= 0 && <Btn variant="secondary" onClick={() => { setEditIdx(-1); setOrigLegajo(null); setLegajo(""); setNombre(""); }}>Cancelar</Btn>}
          </div>
        </div>
      </div>
      <div style={{ flex: "2 1 400px", background: cl.card, borderRadius: 12, padding: 24 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
          <h3 style={{ margin: 0, color: cl.text, fontSize: 18 }}>Legajos ({employees.length})</h3>
          <Inp value={search} onChange={setSearch} placeholder="Buscar..." style={{ minWidth: 180 }} />
        </div>
        <div style={{ maxHeight: 420, overflowY: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
            <thead><tr style={{ borderBottom: "2px solid " + cl.border }}>
              <th style={{ textAlign: "left", padding: "10px 12px", color: cl.muted }}>Legajo</th>
              <th style={{ textAlign: "left", padding: "10px 12px", color: cl.muted }}>Apellido y Nombre</th>
              <th style={{ textAlign: "right", padding: "10px 12px", color: cl.muted }}>Acciones</th>
            </tr></thead>
            <tbody>
              {filtered.map((emp, _i) => {
                const ri = employees.indexOf(emp);
                return (
                  <tr key={emp.legajo} style={{ borderBottom: "1px solid " + cl.border + "22" }}>
                    <td style={{ padding: "10px 12px", color: cl.accent, fontWeight: 700 }}>{emp.legajo}</td>
                    <td style={{ padding: "10px 12px", color: cl.text }}>{emp.nombre}</td>
                    <td style={{ padding: "10px 12px", textAlign: "right" }}>
                      <Btn small variant="ghost" onClick={() => { setLegajo(String(emp.legajo)); setNombre(emp.nombre); setEditIdx(ri); setOrigLegajo(emp.legajo); }} style={{ marginRight: 6 }}>Editar</Btn>
                      <Btn small variant="danger" onClick={() => del(ri)}>x</Btn>
                    </td>
                  </tr>
                );
              })}
              {filtered.length === 0 && <tr><td colSpan={3} style={{ padding: 24, textAlign: "center", color: cl.muted }}>{search ? "Sin resultados" : "No hay legajos"}</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

      const saved = await FB.saveVale(nv);
      setVouchers([...vouchers, saved]);
      showToast("Vale cargado");
      reset();
    }
  };

  const selectForEdit = (v) => { setLegajo(String(v.legajo)); setEmpName(v.nombre); setMes(v.mes); setAnio(String(v.anio)); setTipo(v.tipo); setValor(String(v.valor)); setObs(v.obs || ""); setEditId(v.id); };
  const cancelEdit = () => { setEditId(null); setLegajo(""); setEmpName(""); setValor(""); setObs(""); };

  const delVale = async (id) => {
    if (!confirm("¿Eliminar este vale?")) return;
    await FB.deleteValeDoc(id);
    setVouchers(vouchers.filter(x => x.id !== id));
    showToast("Vale eliminado");
    if (editId === id) cancelEdit();
  };

  const filteredSrch = employees.filter(e => e.nombre.includes(srchTerm.toUpperCase()) || String(e.legajo).includes(srchTerm));
  const editList = vouchers.filter(v => {
    if (fMes !== "TODOS" && v.mes !== fMes) return false;
    if (v.anio !== parseInt(fAnio)) return false;
    if (fLegajo.trim() && !String(v.legajo).includes(fLegajo) && !v.nombre.toUpperCase().includes(fLegajo.toUpperCase())) return false;
    return true;
  }).sort((a, b) => a.legajo - b.legajo);
  const years = []; for (let y = CY - 2; y <= CY + 1; y++) years.push(String(y));

  return (
    <div>
      <div style={{ display: "flex", gap: 4, marginBottom: 20, background: cl.card, borderRadius: 10, padding: 4, width: "fit-content" }}>
        {["cargar", "editar"].map(m => (
          <button key={m} onClick={() => { setMode(m); reset(); }} style={{
            padding: "10px 22px", borderRadius: 8, border: "none", fontWeight: 600, fontSize: 14,
            background: mode === m ? cl.accent : "transparent", color: mode === m ? "#fff" : cl.muted, cursor: "pointer"
          }}>{m === "cargar" ? "Cargar Vale" : "Editar Vales"}</button>
        ))}
      </div>

      {mode === "cargar" ? (
        <div style={{ display: "flex", gap: 24, flexWrap: "wrap" }}>
          <div style={{ flex: "1 1 360px", background: cl.card, borderRadius: 12, padding: 24 }}>
            <h3 style={{ margin: "0 0 20px", color: cl.text, fontSize: 18 }}>Nuevo Vale</h3>
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div style={{ display: "flex", gap: 10, alignItems: "flex-end" }}>
                <Inp label="Nº Legajo" value={legajo} onChange={lookup} type="number" placeholder="Legajo" style={{ flex: 1 }} />
                <Btn variant="secondary" onClick={() => setShowSrch(!showSrch)}>Buscar</Btn>
              </div>
              <Inp label="Nombre" value={empName} onChange={() => {}} readOnly placeholder="Se completa automáticamente" />
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                <Sel label="Mes" value={mes} onChange={setMes} options={MONTHS} style={{ flex: 1, minWidth: 140 }} />
                <Sel label="Año" value={anio} onChange={setAnio} options={years} style={{ flex: 1, minWidth: 100 }} />
              </div>
              <div style={{ display: "flex", gap: 20, alignItems: "center" }}>
                <label style={{ fontSize: 13, color: cl.muted, fontWeight: 500 }}>Tipo:</label>
                {["ADELANTO", "MERCADERÍA"].map(t => (
                  <label key={t} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", color: cl.text, fontSize: 14 }}>
                    <input type="radio" checked={tipo === t} onChange={() => setTipo(t)} style={{ accentColor: cl.accent }} />{t}
                  </label>
                ))}
              </div>
              <Inp label="Valor ($)" value={valor} onChange={setValor} type="number" placeholder="0" />
              <Inp label="Observación" value={obs} onChange={setObs} placeholder="Opcional" />
              <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
                <Btn onClick={save}>Guardar</Btn>
                <Btn variant="secondary" onClick={reset}>Limpiar</Btn>
              </div>
            </div>
          </div>
          {showSrch && (
            <div style={{ flex: "1 1 320px", background: cl.card, borderRadius: 12, padding: 24, maxHeight: 500 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <h3 style={{ margin: 0, color: cl.text, fontSize: 18 }}>Buscar Empleado</h3>
                <Btn small variant="secondary" onClick={() => setShowSrch(false)}>x</Btn>
              </div>
              <Inp value={srchTerm} onChange={setSrchTerm} placeholder="Nombre o legajo..." style={{ marginBottom: 12 }} />
              <div style={{ maxHeight: 360, overflowY: "auto" }}>
                {filteredSrch.slice(0, 50).map(emp => (
                  <div key={emp.legajo} onClick={() => { setLegajo(String(emp.legajo)); setEmpName(emp.nombre); setShowSrch(false); setSrchTerm(""); }}
                    style={{ padding: "10px 14px", borderBottom: "1px solid " + cl.border + "22", cursor: "pointer", display: "flex", gap: 14 }}>
                    <span style={{ color: cl.accent, fontWeight: 700, minWidth: 60 }}>{emp.legajo}</span>
                    <span style={{ color: cl.text }}>{emp.nombre}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      ) : (
        <div style={{ display: "flex", gap: 24, flexWrap: "wrap" }}>
          <div style={{ flex: "2 1 400px", background: cl.card, borderRadius: 12, padding: 24 }}>
            <h3 style={{ margin: "0 0 16px", color: cl.text, fontSize: 18 }}>Vales ({editList.length})</h3>
            <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
              <Sel value={fMes} onChange={setFMes} options={["TODOS", ...MONTHS]} style={{ minWidth: 120 }} />
              <Sel value={fAnio} onChange={setFAnio} options={years} style={{ minWidth: 90 }} />
              <Inp value={fLegajo} onChange={setFLegajo} placeholder="Buscar legajo o nombre..." style={{ flex: 1, minWidth: 160 }} />
            </div>
            <div style={{ overflowX: "auto", maxHeight: 460, overflowY: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, minWidth: 550 }}>
                <thead><tr style={{ borderBottom: "2px solid " + cl.border, position: "sticky", top: 0, background: cl.card }}>
                  {["Legajo", "Nombre", "Mes", "Tipo", "Valor", ""].map(h => (
                    <th key={h} style={{ textAlign: h === "Valor" ? "right" : "left", padding: "8px", color: cl.muted, fontWeight: 600 }}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {editList.map(v => (
                    <tr key={v.id} style={{ borderBottom: "1px solid " + cl.border + "22", background: editId === v.id ? cl.accent + "15" : "transparent", cursor: "pointer" }} onClick={() => selectForEdit(v)}>
                      <td style={{ padding: 8, color: cl.accent, fontWeight: 700 }}>{v.legajo}</td>
                      <td style={{ padding: 8, color: cl.text, maxWidth: 160, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{v.nombre}</td>
                      <td style={{ padding: 8, color: cl.text, fontSize: 12 }}>{v.mes}</td>
                      <td style={{ padding: 8 }}><Badge tipo={v.tipo} /></td>
                      <td style={{ padding: 8, textAlign: "right", color: cl.text, fontWeight: 600 }}>${v.valor.toLocaleString("es-AR")}</td>
                      <td style={{ padding: 8 }}><Btn small variant="danger" onClick={(e) => { e.stopPropagation(); delVale(v.id); }}>x</Btn></td>
                    </tr>
                  ))}
                  {editList.length === 0 && <tr><td colSpan={6} style={{ padding: 24, textAlign: "center", color: cl.muted }}>No hay vales en este periodo</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
          <div style={{ flex: "1 1 300px", background: cl.card, borderRadius: 12, padding: 24 }}>
            <h3 style={{ margin: "0 0 20px", color: cl.text, fontSize: 18 }}>{editId ? "Editar Vale" : "Seleccione un vale"}</h3>
            {editId ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <Inp label="Nº Legajo" value={legajo} onChange={() => {}} readOnly />
                <Inp label="Nombre" value={empName} onChange={() => {}} readOnly />
                <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                  <Sel label="Mes" value={mes} onChange={setMes} options={MONTHS} style={{ flex: 1, minWidth: 120 }} />
                  <Sel label="Año" value={anio} onChange={setAnio} options={years} style={{ flex: 1, minWidth: 90 }} />
                </div>
                <div style={{ display: "flex", gap: 20, alignItems: "center" }}>
                  <label style={{ fontSize: 13, color: cl.muted, fontWeight: 500 }}>Tipo:</label>
                  {["ADELANTO", "MERCADERÍA"].map(t => (
                    <label key={t} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", color: cl.text, fontSize: 14 }}>
                      <input type="radio" checked={tipo === t} onChange={() => setTipo(t)} style={{ accentColor: cl.accent }} />{t}
                    </label>
                  ))}
                </div>
                <Inp label="Valor ($)" value={valor} onChange={setValor} type="number" placeholder="0" autoFocus />
                <Inp label="Observación" value={obs} onChange={setObs} placeholder="Opcional" />
                <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
                  <Btn onClick={save}>Actualizar</Btn>
                  <Btn variant="secondary" onClick={cancelEdit}>Cancelar</Btn>
                </div>
              </div>
            ) : (
              <div style={{ color: cl.muted, textAlign: "center", padding: "40px 20px" }}>
                <div style={{ fontSize: 40, marginBottom: 12, opacity: 0.3 }}>←</div>
                <p>Haga clic en un vale de la lista para editarlo</p>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// --- Tab: Búsqueda ---
function TabBusqueda({ employees }) {
  const [search, setSearch] = useState("");
  const [filterBy, setFilterBy] = useState("NOMBRE");
  const filtered = search.trim() ? employees.filter(e => {
    const q = search.toUpperCase();
    return filterBy === "NOMBRE" ? e.nombre.includes(q) : String(e.legajo).includes(q);
  }) : employees;

  return (
    <div style={{ background: cl.card, borderRadius: 12, padding: 24 }}>
      <h3 style={{ margin: "0 0 20px", color: cl.text, fontSize: 18 }}>Búsqueda de Personal</h3>
      <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap", alignItems: "flex-end" }}>
        <Sel label="Filtrar por" value={filterBy} onChange={setFilterBy}
          options={[{ value: "NOMBRE", label: "Apellido y Nombre" }, { value: "LEGAJO", label: "Nº Legajo" }]} style={{ minWidth: 180 }} />
        <Inp label="Buscar" value={search} onChange={setSearch} placeholder={filterBy === "NOMBRE" ? "Ej: ALVAREZ" : "Ej: 1034"} autoFocus style={{ flex: 1, minWidth: 200 }} />
      </div>
      <div style={{ maxHeight: 460, overflowY: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
          <thead><tr style={{ borderBottom: "2px solid " + cl.border, position: "sticky", top: 0, background: cl.card }}>
            <th style={{ textAlign: "left", padding: "10px 12px", color: cl.muted, width: 100 }}>Legajo</th>
            <th style={{ textAlign: "left", padding: "10px 12px", color: cl.muted }}>Apellido y Nombre</th>
          </tr></thead>
          <tbody>
            {filtered.map(emp => (
              <tr key={emp.legajo} style={{ borderBottom: "1px solid " + cl.border + "22" }}>
                <td style={{ padding: "10px 12px", color: cl.accent, fontWeight: 700 }}>{emp.legajo}</td>
                <td style={{ padding: "10px 12px", color: cl.text }}>{emp.nombre}</td>
              </tr>
            ))}
            {filtered.length === 0 && <tr><td colSpan={2} style={{ padding: 24, textAlign: "center", color: cl.muted }}>Sin resultados</td></tr>}
          </tbody>
        </table>
      </div>
      <p style={{ margin: "14px 0 0", color: cl.muted, fontSize: 13 }}>{filtered.length} resultado(s)</p>
    </div>
  );
}

// --- Tab: Informes ---
function TabInformes({ vouchers }) {
  const [mes, setMes] = useState(CM);
  const [anio, setAnio] = useState(String(CY));
  const [results, setResults] = useState(null);
  const years = []; for (let y = CY - 3; y <= CY + 1; y++) years.push(String(y));

  const doSearch = () => {
    const f = vouchers.filter(v => v.mes === mes && v.anio === parseInt(anio));
    f.sort((a, b) => a.legajo - b.legajo);
    setResults(f);
  };

  const exportCSV = () => {
    if (!results || !results.length) return;
    const h = ["Legajo", "Nombre", "Mes", "Anio", "Tipo", "Valor", "Observacion", "Fecha"];
    const rows = results.map(v => [v.legajo, '"' + v.nombre + '"', v.mes, v.anio, v.tipo, v.valor, '"' + (v.obs || "") + '"',
      v.fecha ? new Date(v.fecha).toLocaleDateString("es-AR") : ""]);
    const csv = "\uFEFF" + [h.join(";"), ...rows.map(r => r.join(";"))].join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "Vales_" + mes + "_" + anio + ".csv"; a.click();
    URL.revokeObjectURL(url);
  };

  const tA = results ? results.filter(v => v.tipo === "ADELANTO").reduce((s, v) => s + v.valor, 0) : 0;
  const tM = results ? results.filter(v => v.tipo === "MERCADERÍA").reduce((s, v) => s + v.valor, 0) : 0;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ background: cl.card, borderRadius: 12, padding: 24 }}>
        <h3 style={{ margin: "0 0 20px", color: cl.text, fontSize: 18 }}>Informe de Vales</h3>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "flex-end" }}>
          <Sel label="Mes" value={mes} onChange={setMes} options={MONTHS} style={{ minWidth: 160 }} />
          <Sel label="Año" value={anio} onChange={setAnio} options={years} style={{ minWidth: 110 }} />
          <Btn onClick={doSearch}>Buscar</Btn>
        </div>
      </div>
      {results !== null && (
        <>
          <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
            {[
              { l: "Total General", v: tA + tM, color: cl.accent },
              { l: "Adelantos", v: tA, color: "#f97316" },
              { l: "Mercadería", v: tM, color: "#60a5fa" },
              { l: "Cant. Vales", v: results.length, color: cl.success, raw: true }
            ].map(x => (
              <div key={x.l} style={{ flex: "1 1 160px", background: cl.card, borderRadius: 12, padding: 20, borderLeft: "4px solid " + x.color }}>
                <div style={{ fontSize: 13, color: cl.muted, marginBottom: 6 }}>{x.l}</div>
                <div style={{ fontSize: 24, fontWeight: 700, color: x.color }}>{x.raw ? x.v : "$" + x.v.toLocaleString("es-AR")}</div>
              </div>
            ))}
          </div>
          <div style={{ background: cl.card, borderRadius: 12, padding: 24 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
              <h3 style={{ margin: 0, color: cl.text, fontSize: 18 }}>Vales — {mes} {anio}</h3>
              <Btn variant="success" onClick={exportCSV} disabled={!results.length}>Exportar CSV (Excel)</Btn>
            </div>
            <div style={{ overflowX: "auto", maxHeight: 500, overflowY: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14, minWidth: 580 }}>
                <thead><tr style={{ borderBottom: "2px solid " + cl.border, position: "sticky", top: 0, background: cl.card }}>
                  {["Legajo", "Nombre", "Tipo", "Valor", "Observación", "Fecha"].map(h => (
                    <th key={h} style={{ textAlign: h === "Valor" ? "right" : "left", padding: 10, color: cl.muted, fontWeight: 600 }}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {results.map(v => (
                    <tr key={v.id} style={{ borderBottom: "1px solid " + cl.border + "22" }}>
                      <td style={{ padding: 10, color: cl.accent, fontWeight: 700 }}>{v.legajo}</td>
                      <td style={{ padding: 10, color: cl.text }}>{v.nombre}</td>
                      <td style={{ padding: 10 }}><Badge tipo={v.tipo} /></td>
                      <td style={{ padding: 10, textAlign: "right", color: cl.text, fontWeight: 600 }}>${v.valor.toLocaleString("es-AR")}</td>
                      <td style={{ padding: 10, color: cl.muted }}>{v.obs || "—"}</td>
                      <td style={{ padding: 10, color: cl.muted, fontSize: 13 }}>{v.fecha ? new Date(v.fecha).toLocaleDateString("es-AR") : "—"}</td>
                    </tr>
                  ))}
                  {!results.length && <tr><td colSpan={6} style={{ padding: 24, textAlign: "center", color: cl.muted }}>No hay vales para este periodo</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// --- Main App ---
function App() {
  const [tab, setTab] = useState(0);
  const [employees, setEmployees] = useState([]);
  const [vouchers, setVouchers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [online, setOnline] = useState(navigator.onLine);
  const [FB, setFB] = useState(null);

  useEffect(() => {
    const onOn = () => setOnline(true);
    const onOff = () => setOnline(false);
    window.addEventListener("online", onOn);
    window.addEventListener("offline", onOff);
    return () => { window.removeEventListener("online", onOn); window.removeEventListener("offline", onOff); };
  }, []);

  useEffect(() => {
    const init = async () => {
      const fb = window.__FB;
      if (!fb) return;
      setFB(fb);
      try {
        const { emps, seeded } = await fb.seedIfEmpty();
        const vals = seeded ? await fb.loadVales() : await fb.loadVales();
        setEmployees(emps);
        setVouchers(vals);
      } catch (err) {
        console.error("Error loading data:", err);
      }
      setLoading(false);
    };
    if (window.__FB) init();
    else window.addEventListener("fb-ready", init, { once: true });
  }, []);

  const showToast = useCallback((m, t) => setToast({ message: m, type: t || "success" }), []);

  if (loading) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 32, fontWeight: 800, color: cl.accent, marginBottom: 8 }}>PANIFICADORA MAURI</div>
          <div style={{ color: cl.muted }}>Cargando datos desde Firestore...</div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <header style={{ background: cl.header, borderBottom: "1px solid " + cl.border + "33", padding: "16px 24px" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
          <div>
            <div style={{ fontSize: 22, fontWeight: 800 }}>
              <span style={{ color: cl.accent }}>PANIFICADORA</span>{" "}
              <span style={{ color: cl.text }}>MAURI</span>
            </div>
            <div style={{ fontSize: 12, color: cl.muted, letterSpacing: 1, marginTop: 2 }}>SISTEMA DE VALES DE PERSONAL</div>
          </div>
          <div style={{ textAlign: "right", display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
            <div style={{ fontSize: 13, color: cl.muted }}>{new Date().toLocaleDateString("es-AR", { weekday: "long", year: "numeric", month: "long", day: "numeric" })}</div>
            <div style={{ fontSize: 12, display: "flex", alignItems: "center", color: online ? cl.success : cl.accent }}>
              <span className={"sync-dot " + (online ? "online" : "offline")}></span>
              {online ? "Conectado — Firestore" : "Sin conexión — modo offline"}
            </div>
          </div>
        </div>
      </header>
      <nav style={{ background: cl.header, borderBottom: "1px solid " + cl.border + "33", padding: "0 24px" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", gap: 0, overflowX: "auto" }}>
          {TABS.map((t, i) => (
            <button key={t} onClick={() => setTab(i)} style={{
              padding: "14px 24px", border: "none", fontWeight: 600, fontSize: 14, background: "transparent",
              cursor: "pointer", color: tab === i ? cl.accent : cl.muted,
              borderBottom: tab === i ? "3px solid " + cl.accent : "3px solid transparent"
            }}>{t}</button>
          ))}
        </div>
      </nav>
      <main style={{ maxWidth: 1100, margin: "0 auto", padding: 24 }}>
        {tab === 0 && <TabPersonal employees={employees} setEmployees={setEmployees} vouchers={vouchers} setVouchers={setVouchers} showToast={showToast} FB={FB} />}
        {tab === 1 && <TabVales employees={employees} vouchers={vouchers} setVouchers={setVouchers} showToast={showToast} FB={FB} />}
        {tab === 2 && <TabBusqueda employees={employees} />}
        {tab === 3 && <TabInformes vouchers={vouchers} employees={employees} />}
      </main>
      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
