var CACHE = {
  getEmps: function() { try { var d = localStorage.getItem("pm_emps_cache"); return d ? JSON.parse(d) : null; } catch(e) { return null; } },
  setEmps: function(d) { try { localStorage.setItem("pm_emps_cache", JSON.stringify(d)); } catch(e) {} },
  getVales: function() { try { var d = localStorage.getItem("pm_vales_cache"); return d ? JSON.parse(d) : null; } catch(e) { return null; } },
  setVales: function(d) { try { localStorage.setItem("pm_vales_cache", JSON.stringify(d)); } catch(e) {} },
  clear: function() { try { localStorage.removeItem("pm_emps_cache"); localStorage.removeItem("pm_vales_cache"); } catch(e) {} }
};

// --- DB Helpers ---
var FB = {
  loadEmpleados: async function() {
    var snap = await db.collection("empleados").get();
    var arr = [];
    snap.forEach(function(d) { arr.push(Object.assign({ id: d.id }, d.data())); });
    arr.sort(function(a, b) { return a.legajo - b.legajo; });
    CACHE.setEmps(arr);
    return arr;
  },
  loadVales: async function() {
    var snap = await db.collection("vales").get();
    var arr = [];
    snap.forEach(function(d) { arr.push(Object.assign({ id: d.id }, d.data())); });
    CACHE.setVales(arr);
    return arr;
  },
  loadFromCacheOrFirestore: async function() {
    var cachedEmps = CACHE.getEmps();
    var cachedVales = CACHE.getVales();
    if (cachedEmps && cachedVales && cachedEmps.length > 0) {
      // Return cache immediately, sync in background
      setTimeout(async function() {
        try {
          await FB.loadEmpleados();
          await FB.loadVales();
        } catch(e) { /* offline, no problem */ }
      }, 100);
      return { emps: cachedEmps, vales: cachedVales, fromCache: true };
    }
    // No cache — load from Firestore
    var emps = await FB.loadEmpleados();
    var vales = await FB.loadVales();
    return { emps: emps, vales: vales, fromCache: false };
  },
  saveEmpleado: async function(emp) {
    await db.collection("empleados").doc("leg_" + emp.legajo).set({ legajo: emp.legajo, nombre: emp.nombre });
  },
  deleteEmpleado: async function(legajo) {
    await db.collection("empleados").doc("leg_" + legajo).delete();
  },
  saveVale: async function(vale) {
    var docId = vale.id || ("v_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6));
    var data = Object.assign({}, vale, { id: docId });
    await db.collection("vales").doc(docId).set(data);
    return data;
  },
  deleteValeDoc: async function(id) {
    await db.collection("vales").doc(String(id)).delete();
  },
  updateValesForLegajo: async function(oldLeg, newLeg, newNombre, vales) {
    var batch = db.batch();
    var count = 0;
    for (var i = 0; i < vales.length; i++) {
      if (vales[i].legajo === oldLeg) {
        batch.update(db.collection("vales").doc(String(vales[i].id)), { legajo: newLeg, nombre: newNombre });
        count++;
      }
    }
    if (count > 0) await batch.commit();
  },
  seedIfEmpty: async function() {
    // Check cache first — if we have data, no need to seed
    var cachedEmps = CACHE.getEmps();
    if (cachedEmps && cachedEmps.length > 0) {
      return { emps: cachedEmps, seeded: false };
    }
    var snap = await db.collection("empleados").limit(1).get();
    if (!snap.empty) return { emps: null, seeded: false }; // will be loaded by loadFromCacheOrFirestore
    // Seed
    var seedEmps = SEED_EMP.map(function(e) { return { legajo: e.l, nombre: e.n }; });
    var batch = db.batch();
    for (var i = 0; i < seedEmps.length; i++) {
      batch.set(db.collection("empleados").doc("leg_" + seedEmps[i].legajo), seedEmps[i]);
    }
    await batch.commit();
    var empMap = {};
    seedEmps.forEach(function(e) { empMap[e.legajo] = e.nombre; });
    var MN = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO"];
    for (var c = 0; c < SV.length; c += 400) {
      var chunk = SV.slice(c, c + 400);
      var vb = db.batch();
      for (var j = 0; j < chunk.length; j++) {
        var v = chunk[j];
        var docId = "seed_" + (c + j);
        vb.set(db.collection("vales").doc(docId), {
          id: docId, legajo: v[0], nombre: empMap[v[0]] || "LEGAJO " + v[0],
          mes: MN[v[1]], anio: 2026, tipo: "ADELANTO", valor: v[2], obs: v[3],
          fecha: "2026-0" + (v[1]+1) + "-15T12:00:00.000Z"
        });
      }
      await vb.commit();
    }
    var seededEmps = seedEmps.map(function(e) { return Object.assign({ id: "leg_" + e.legajo }, e); });
    return { emps: seededEmps, seeded: true };
  }
};
